    replacement: "What the User Approved"
  - term: "Task Skeleton Fidelity"
    replacement: "Answer Method Check"
  - term: "Design Skeleton Fidelity"
    replacement: "Design Answer Method Check"
  - term: "Task skeleton family"
    replacement: "How this should be answered"
  - term: "Not-sufficient substitute"
    replacement: "What is not enough"
  - term: "Target-achieved predicate"
    replacement: "What counts as done"
  - term: "Target-producing spine"
    replacement: "Steps that make the result true"
