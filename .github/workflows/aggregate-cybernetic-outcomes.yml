name: Aggregate Cybernetic Outcomes

on:
  workflow_dispatch:
    inputs:
      event_path:
        description: "Path to a metadata-only event JSON/JSONL file in the repository"
        required: false
        default: "observability/examples/metadata-only-event.json"

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate event package
        run: |
          python3 scripts/validate_run_events.py --taxonomy observability/taxonomies/failure-taxonomy.yaml "${{ inputs.event_path }}"

      - name: Aggregate metadata-only outcomes
        run: |
          mkdir -p observability/generated
          python3 scripts/aggregate_run_events.py \
            --input "${{ inputs.event_path }}" \
            --out observability/generated/aggregation-summary.json \
            --eval-candidates-out observability/generated/eval-candidates.json \
            --dry-run

      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cybernetic-observability-candidates
          path: |
            observability/generated/aggregation-summary.json
            observability/generated/eval-candidates.json
          retention-days: 14
